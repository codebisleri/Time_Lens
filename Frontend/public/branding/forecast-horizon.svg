<svg width="800" height="360" viewBox="0 0 800 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Forecast horizon">
  <!-- DhishaAI forecasting motif: actual history transitioning into a forecast horizon. -->
  <defs>
    <linearGradient id="fh-band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef7602" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ef7602" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fh-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7fc4e8"/>
      <stop offset="55%" stop-color="#bfe0f2"/>
      <stop offset="100%" stop-color="#f7a24d"/>
    </linearGradient>
  </defs>
  <!-- Forecast horizon shaded region (everything right of "now"). -->
  <rect x="470" y="20" width="320" height="300" fill="url(#fh-band)"/>
  <!-- "Now" divider. -->
  <line x1="470" y1="14" x2="470" y2="326" stroke="#f7a24d" stroke-width="1.5" stroke-dasharray="4 5" stroke-opacity="0.7"/>
  <!-- Confidence band around the forecast tail. -->
  <path d="M470 196 C 545 150, 620 150, 700 96 L 790 70 L 790 210 L 700 176 C 620 214, 545 224, 470 236 Z" fill="#ef7602" fill-opacity="0.10"/>
  <!-- Actual history (solid). -->
  <path d="M10 250 C 70 235, 110 210, 160 220 C 210 230, 250 180, 300 188 C 350 196, 410 168, 470 196" stroke="url(#fh-line)" stroke-width="3" stroke-linecap="round"/>
  <!-- Forecast (dashed continuation). -->
  <path d="M470 196 C 545 150, 620 150, 700 130 L 790 116" stroke="#f7a24d" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 9"/>
  <!-- Data points on the actual line. -->
  <g fill="#cfe7f4">
    <circle cx="160" cy="220" r="3.5"/>
    <circle cx="300" cy="188" r="3.5"/>
    <circle cx="470" cy="196" r="4.5" fill="#f7a24d"/>
  </g>
  <!-- Baseline grid ticks. -->
  <g stroke="#bfe0f2" stroke-opacity="0.18" stroke-width="1">
    <line x1="10" y1="326" x2="790" y2="326"/>
    <line x1="160" y1="20" x2="160" y2="326" stroke-dasharray="2 8"/>
    <line x1="300" y1="20" x2="300" y2="326" stroke-dasharray="2 8"/>
    <line x1="630" y1="20" x2="630" y2="326" stroke-dasharray="2 8"/>
  </g>
</svg>
