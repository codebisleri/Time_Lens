<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Planning timeline">
  <!-- Planning horizon timeline: history milestones → forecast milestones. -->
  <line x1="20" y1="100" x2="780" y2="100" stroke="#bfe0f2" stroke-opacity="0.30" stroke-width="2"/>
  <!-- Past (solid) -->
  <g fill="#7fc4e8">
    <circle cx="90" cy="100" r="7"/>
    <circle cx="250" cy="100" r="7"/>
    <circle cx="410" cy="100" r="7"/>
  </g>
  <!-- "Now" marker -->
  <circle cx="490" cy="100" r="10" fill="#f7a24d"/>
  <circle cx="490" cy="100" r="16" fill="none" stroke="#f7a24d" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- Future (hollow) -->
  <g fill="none" stroke="#f7a24d" stroke-width="2">
    <circle cx="610" cy="100" r="7"/>
    <circle cx="710" cy="100" r="7"/>
  </g>
  <!-- forecast horizon shading on the future half -->
  <rect x="490" y="60" width="290" height="80" fill="#ef7602" fill-opacity="0.06"/>
  <!-- connector ticks up to labels -->
  <g stroke="#bfe0f2" stroke-opacity="0.25" stroke-width="1">
    <line x1="90" y1="100" x2="90" y2="70"/>
    <line x1="250" y1="100" x2="250" y2="70"/>
    <line x1="410" y1="100" x2="410" y2="70"/>
    <line x1="610" y1="100" x2="610" y2="130"/>
    <line x1="710" y1="100" x2="710" y2="130"/>
  </g>
</svg>
