<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Analytics grid">
  <!-- Analytical grid system with plotted markers — a planning workbench backdrop. -->
  <defs>
    <pattern id="ag-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#bfe0f2" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#ag-grid)"/>
  <!-- Axes. -->
  <line x1="40" y1="40" x2="40" y2="360" stroke="#bfe0f2" stroke-opacity="0.30" stroke-width="1.5"/>
  <line x1="40" y1="360" x2="760" y2="360" stroke="#bfe0f2" stroke-opacity="0.30" stroke-width="1.5"/>
  <!-- Scatter of forecast vs actual points. -->
  <g>
    <circle cx="140" cy="280" r="4" fill="#7fc4e8" fill-opacity="0.8"/>
    <circle cx="220" cy="240" r="5" fill="#7fc4e8" fill-opacity="0.6"/>
    <circle cx="300" cy="260" r="4" fill="#f7a24d" fill-opacity="0.8"/>
    <circle cx="380" cy="190" r="6" fill="#7fc4e8" fill-opacity="0.5"/>
    <circle cx="460" cy="210" r="4" fill="#f7a24d" fill-opacity="0.7"/>
    <circle cx="540" cy="150" r="5" fill="#7fc4e8" fill-opacity="0.7"/>
    <circle cx="620" cy="170" r="4" fill="#f7a24d" fill-opacity="0.8"/>
    <circle cx="700" cy="120" r="6" fill="#7fc4e8" fill-opacity="0.5"/>
  </g>
  <!-- Trend line through the cloud. -->
  <line x1="60" y1="300" x2="740" y2="110" stroke="#f7a24d" stroke-width="2" stroke-opacity="0.7" stroke-dasharray="6 6"/>
</svg>
