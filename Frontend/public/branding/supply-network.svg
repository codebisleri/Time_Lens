<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Supply chain network">
  <!-- Supply-chain network: distribution nodes linked by demand-flow edges. -->
  <g stroke="#7fc4e8" stroke-opacity="0.25" stroke-width="1.5">
    <line x1="120" y1="200" x2="320" y2="110"/>
    <line x1="120" y1="200" x2="320" y2="290"/>
    <line x1="320" y1="110" x2="520" y2="80"/>
    <line x1="320" y1="110" x2="520" y2="200"/>
    <line x1="320" y1="290" x2="520" y2="200"/>
    <line x1="320" y1="290" x2="520" y2="320"/>
    <line x1="520" y1="80" x2="680" y2="160"/>
    <line x1="520" y1="200" x2="680" y2="160"/>
    <line x1="520" y1="320" x2="680" y2="160"/>
  </g>
  <!-- demand-flow accent edges -->
  <g stroke="#f7a24d" stroke-opacity="0.6" stroke-width="2" stroke-dasharray="3 7">
    <line x1="120" y1="200" x2="320" y2="110"/>
    <line x1="320" y1="110" x2="520" y2="200"/>
    <line x1="520" y1="200" x2="680" y2="160"/>
  </g>
  <!-- nodes -->
  <g>
    <circle cx="120" cy="200" r="14" fill="#073e5c" stroke="#7fc4e8" stroke-width="2"/>
    <circle cx="320" cy="110" r="11" fill="#073e5c" stroke="#9fd2ec" stroke-width="2"/>
    <circle cx="320" cy="290" r="11" fill="#073e5c" stroke="#9fd2ec" stroke-width="2"/>
    <circle cx="520" cy="80" r="9" fill="#073e5c" stroke="#9fd2ec" stroke-width="1.5"/>
    <circle cx="520" cy="200" r="13" fill="#ef7602" stroke="#f7a24d" stroke-width="2"/>
    <circle cx="520" cy="320" r="9" fill="#073e5c" stroke="#9fd2ec" stroke-width="1.5"/>
    <circle cx="680" cy="160" r="11" fill="#073e5c" stroke="#9fd2ec" stroke-width="2"/>
  </g>
</svg>
