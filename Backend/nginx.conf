# ============================================================================
# Nginx Configuration for Time Lens Production Deployment
# ============================================================================
# Place in /etc/nginx/sites-available/ or use with docker-compose
# For Docker: Copy to ./nginx.conf and mount in container

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] \"$request\" '
                    '$status $body_bytes_sent \"$http_referer\" '
                    '\"$http_user_agent\" \"$http_x_forwarded_for\"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;

    # ────────────────────────────────────────────────────────────────────
    # HTTP to HTTPS Redirect
    # ────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name forecast.dhishai.com;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # ────────────────────────────────────────────────────────────────────
    # HTTPS Server Block
    # ────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name forecast.dhishai.com;

        # SSL Certificates
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        
        # SSL Configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options \"SAMEORIGIN\" always;
        add_header X-Content-Type-Options \"nosniff\" always;
        add_header X-XSS-Protection \"1; mode=block\" always;
        add_header Referrer-Policy \"strict-origin-when-cross-origin\" always;
        add_header Permissions-Policy \"geolocation=(), microphone=(), camera=()\" always;

        # Access logs
        access_log /var/log/nginx/timelens_access.log main;
        error_log /var/log/nginx/timelens_error.log warn;

        # ────────────────────────────────────────────────────────────────
        # Main Streamlit Application
        # ────────────────────────────────────────────────────────────────
        location / {
            limit_req zone=general burst=20 nodelay;
            
            proxy_pass http://timelens:8501;
            proxy_http_version 1.1;
            
            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection \"upgrade\";
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # ────────────────────────────────────────────────────────────────
        # Streamlit WebSocket Endpoints
        # ────────────────────────────────────────────────────────────────
        location /_stcore/stream {
            proxy_pass http://timelens:8501;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection \"Upgrade\";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ────────────────────────────────────────────────────────────────
        # API Endpoints (if applicable)
        # ────────────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=100 nodelay;
            
            proxy_pass http://timelens:8501;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ────────────────────────────────────────────────────────────────
        # Health Check Endpoint
        # ────────────────────────────────────────────────────────────────
        location /health {
            access_log off;
            proxy_pass http://timelens:8501/_stcore/health;
        }

        # ────────────────────────────────────────────────────────────────
        # Static Files (Optimization)
        # ────────────────────────────────────────────────────────────────
        location ~* \\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://timelens:8501;
            proxy_cache_valid 30d;
            add_header Cache-Control \"public, immutable, max-age=2592000\";
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ────────────────────────────────────────────────────────────────
        # Deny Access to Sensitive Paths
        # ────────────────────────────────────────────────────────────────
        location ~ /\\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ════════════════════════════════════════════════════════════════════
    # For local/Docker testing without SSL (remove in production!)
    # ════════════════════════════════════════════════════════════════════
    server {
        listen 8080;
        server_name localhost 127.0.0.1;

        location / {
            proxy_pass http://timelens:8501;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection \"Upgrade\";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
        }
    }
}
